name: Manage LTS Prow Job Configs
# Automates adding new and removing deprecated LTS Prow job configurations.
#
# ADD: Uses the existing hack/addProwConfigForRelease.sh to generate config,
#      compares job names against the previous LTS version to detect drift,
#      then opens a PR for review.
# REMOVE: Deletes the config file and removes the envsubst line from
#         deploy-lts-prow.yaml, then opens a PR for review.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - add
          - remove
      version:
        description: 'Kubernetes version (e.g. 1.32)'
        required: true
        type: string
      upstream_config_url:
        description: 'URL to raw upstream config (optional for add — defaults to upstream kubernetes/test-infra for the given version)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — preview changes without pushing branch or creating PR'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

# NOTE: deploy-lts-prow.yaml dynamically discovers all config files in
# config/prow/release-branch-jobs/ (excluding base.yaml) via glob.
# Adding/removing a version only requires adding/deleting the YAML file —
# no workflow file modifications needed.

jobs:
  manage-prow-config:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LTS_RELEASE_APP_ID }}
          private-key: ${{ secrets.LTS_RELEASE_APP_PRIVATE_KEY }}
          owner: aks-lts
          repositories: test-infra

      - name: Validate inputs
        run: |
          VERSION="${{ inputs.version }}"
          ACTION="${{ inputs.action }}"

          # Validate version format (e.g. 1.32)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: $VERSION (expected e.g. 1.32)"
            exit 1
          fi

          CONFIG_FILE="config/prow/release-branch-jobs/${VERSION}.yaml"

          # Default upstream config URL if not provided
          UPSTREAM_URL="${{ inputs.upstream_config_url }}"
          if [ "$ACTION" = "add" ] && [ -z "$UPSTREAM_URL" ]; then
            UPSTREAM_URL="https://raw.githubusercontent.com/kubernetes/test-infra/refs/heads/master/config/jobs/kubernetes/sig-release/release-branch-jobs/${VERSION}.yaml"
            echo "ℹ️  No upstream URL provided, using default: $UPSTREAM_URL"
          fi

          echo "ACTION=$ACTION" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONFIG_FILE=$CONFIG_FILE" >> "$GITHUB_ENV"
          echo "UPSTREAM_URL=$UPSTREAM_URL" >> "$GITHUB_ENV"

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check current state
        run: |
          CONFIG_FILE="config/prow/release-branch-jobs/${VERSION}.yaml"

          if [ "$ACTION" = "add" ]; then
            if [ -f "$CONFIG_FILE" ]; then
              echo "⚠️  Config file $CONFIG_FILE already exists. Will regenerate."
            fi
          elif [ "$ACTION" = "remove" ]; then
            if [ ! -f "$CONFIG_FILE" ]; then
              echo "❌ Config file $CONFIG_FILE does not exist. Nothing to remove."
              exit 1
            fi
          fi

          echo "Current LTS configs:"
          ls -1 config/prow/release-branch-jobs/*.yaml | grep -v base.yaml || echo "(none)"

      - name: Add new LTS version config
        if: inputs.action == 'add'
        run: |
          echo "🚀 Adding Prow config for LTS version ${VERSION}..."

          # Use the existing script
          chmod +x hack/addProwConfigForRelease.sh
          ./hack/addProwConfigForRelease.sh "${VERSION}" "${UPSTREAM_URL}"

          CONFIG_FILE="config/prow/release-branch-jobs/${VERSION}.yaml"

          # Verify config file was generated
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file was not generated: $CONFIG_FILE"
            exit 1
          fi

          # Safety net: revert any workflow file changes the script may have made.
          # The org policy blocks GITHUB_TOKEN from pushing workflow file modifications.
          # With dynamic glob discovery this should be a no-op, but just in case.
          git checkout -- .github/workflows/ 2>/dev/null || true

          echo "✅ Successfully generated Prow config for ${VERSION}"

      - name: Compare jobs against previous version
        if: inputs.action == 'add'
        id: job-diff
        run: |
          set -euo pipefail

          CONFIG_FILE="config/prow/release-branch-jobs/${VERSION}.yaml"

          # Extract job names from the newly generated config
          NEW_JOBS=$(grep -E '^\s*name:\s' "$CONFIG_FILE" | sed 's/.*name:\s*//' | sort)
          NEW_COUNT=$(echo "$NEW_JOBS" | wc -l)
          echo "📊 New config (${VERSION}) has ${NEW_COUNT} jobs:"
          echo "$NEW_JOBS"
          echo ""

          # Find the previous LTS version config to compare against.
          # List all versioned configs, exclude the new one, pick the highest version.
          PREV_CONFIG=""
          PREV_VERSION=""
          for f in $(ls config/prow/release-branch-jobs/*.yaml | grep -v base.yaml | sort -V); do
            v=$(basename "$f" .yaml)
            if [ "$v" != "${VERSION}" ]; then
              PREV_CONFIG="$f"
              PREV_VERSION="$v"
            fi
          done

          if [ -z "$PREV_CONFIG" ]; then
            echo "⚠️  No previous LTS version config found — cannot compare jobs."
            echo "   Skipping diff (first LTS config)."
            echo "job_diff_summary=No previous version to compare against." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing against previous version: ${PREV_VERSION} (${PREV_CONFIG})"
          PREV_JOBS=$(grep -E '^\s*name:\s' "$PREV_CONFIG" | sed 's/.*name:\s*//' | sort)
          PREV_COUNT=$(echo "$PREV_JOBS" | wc -l)
          echo "Previous config (${PREV_VERSION}) has ${PREV_COUNT} jobs:"
          echo "$PREV_JOBS"
          echo ""

          # Find jobs only in previous (dropped)
          DROPPED=$(comm -23 <(echo "$PREV_JOBS") <(echo "$NEW_JOBS"))
          # Find jobs only in new (added)
          ADDED=$(comm -13 <(echo "$PREV_JOBS") <(echo "$NEW_JOBS"))
          # Find jobs in both (common)
          COMMON=$(comm -12 <(echo "$PREV_JOBS") <(echo "$NEW_JOBS"))

          SUMMARY=""
          HAS_DIFF=false

          if [ -n "$DROPPED" ]; then
            HAS_DIFF=true
            DROP_COUNT=$(echo "$DROPPED" | wc -l)
            echo "🔴 ${DROP_COUNT} job(s) in ${PREV_VERSION} but MISSING in ${VERSION}:"
            echo "$DROPPED" | while read -r j; do echo "   - $j"; done
            SUMMARY+="🔴 **Dropped from ${PREV_VERSION}:**\n"
            while IFS= read -r j; do
              SUMMARY+="- \`$j\`\n"
            done <<< "$DROPPED"
            SUMMARY+="\n"
          fi

          if [ -n "$ADDED" ]; then
            HAS_DIFF=true
            ADD_COUNT=$(echo "$ADDED" | wc -l)
            echo "🟢 ${ADD_COUNT} job(s) NEW in ${VERSION} (not in ${PREV_VERSION}):"
            echo "$ADDED" | while read -r j; do echo "   + $j"; done
            SUMMARY+="🟢 **New in ${VERSION}:**\n"
            while IFS= read -r j; do
              SUMMARY+="- \`$j\`\n"
            done <<< "$ADDED"
            SUMMARY+="\n"
          fi

          COMMON_COUNT=$(echo "$COMMON" | wc -l)

          if [ "$HAS_DIFF" = false ]; then
            echo "✅ Job sets are identical between ${PREV_VERSION} and ${VERSION} (${COMMON_COUNT} jobs)"
            SUMMARY="✅ Job sets are identical between ${PREV_VERSION} and ${VERSION} (${COMMON_COUNT} jobs)."
          else
            echo ""
            echo "ℹ️  ${COMMON_COUNT} jobs are common between both versions."
            SUMMARY+="ℹ️ ${COMMON_COUNT} job(s) common between both versions."
          fi

          # Write multiline summary to output
          {
            echo "job_diff_summary<<DIFF_EOF"
            echo -e "$SUMMARY"
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "prev_version=$PREV_VERSION"
            echo "new_count=$NEW_COUNT"
            echo "prev_count=$PREV_COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Remove deprecated LTS version config
        if: inputs.action == 'remove'
        run: |
          echo "🗑️  Removing Prow config for deprecated LTS version ${VERSION}..."

          CONFIG_FILE="config/prow/release-branch-jobs/${VERSION}.yaml"

          # Remove the config file
          rm -f "$CONFIG_FILE"
          echo "✅ Removed $CONFIG_FILE"

          echo ""
          echo "Remaining LTS configs:"
          ls -1 config/prow/release-branch-jobs/*.yaml | grep -v base.yaml || echo "(none)"

      - name: Create branch, commit, and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          BRANCH="automation/prow-config-${{ inputs.action }}-${{ inputs.version }}"
          ACTION="${{ inputs.action }}"
          VERSION="${{ inputs.version }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if there are changes to commit (tracked, staged, or untracked)
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "⚠️  No changes detected. Nothing to commit."
            exit 0
          fi

          # Commit locally (needed for diff preview in both modes)
          COMMIT_MSG="${{ inputs.action == 'add' && format('Add Prow job config for LTS {0}', inputs.version) || format('Remove Prow job config for deprecated LTS {0}', inputs.version) }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "$COMMIT_MSG"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔍 [DRY RUN] Would push branch '$BRANCH' and create PR."
            echo ""
            echo "═══ Changes Preview ═══"
            echo ""
            echo "Files changed:"
            git diff --stat HEAD~1
            echo ""
            echo "Full diff:"
            git diff HEAD~1
            echo "═══════════════════════"

            # Write dry run summary
            {
              echo "## 🔍 Dry Run — Preview Only"
              echo ""
              echo "**Action:** \`${ACTION}\` | **Version:** \`${VERSION}\`"
              echo ""
              echo "No branch was pushed and no PR was created."
              echo "Uncheck **dry_run** and re-run to apply."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git push origin "$BRANCH" --force

          # Build PR title
          if [ "$ACTION" = "add" ]; then
            PR_TITLE="Add LTS $VERSION Prow job config"
          else
            PR_TITLE="Remove deprecated LTS $VERSION Prow job config"
          fi

          # Build PR body
          PR_BODY="## Prow Job Config — LTS ${VERSION}
          
          **Action:** \`${ACTION}\`
          **Version:** \`${VERSION}\`"

          if [ "$ACTION" = "add" ]; then
            PR_BODY="${PR_BODY}
          **Upstream:** \`${UPSTREAM_URL}\`

          ### What changed
          - Generated \`config/prow/release-branch-jobs/${VERSION}.yaml\` from [upstream config](${UPSTREAM_URL})
          - Filtered out GCE/EC2 jobs, removed \`cluster:\` lines, applied \`-lts\` branch suffix
          - Bumped memory to 16Gi for \`pull-kubernetes-verify\` and \`pull-kubernetes-linter-hints\`

          ### Job Comparison (vs ${{ steps.job-diff.outputs.prev_version }})
          ${{ steps.job-diff.outputs.job_diff_summary }}

          ### Review Checklist
          - [ ] Verify the generated jobs look correct (\`config/prow/release-branch-jobs/${VERSION}.yaml\`)
          - [ ] Check that branch references use \`release-${VERSION}-lts\` (not \`release-${VERSION}\`)
          - [ ] Review any dropped or new jobs flagged above
          - [ ] After merge, run [Deploy AKS LTS Prow](../actions/workflows/deploy-lts-prow.yaml) to apply
          - [ ] Create a test PR on [aks-lts/kubernetes](https://github.com/aks-lts/kubernetes) targeting \`release-${VERSION}-lts\` to verify jobs trigger"
          else
            PR_BODY="${PR_BODY}

          ### What changed
          - Removed \`config/prow/release-branch-jobs/${VERSION}.yaml\`

          ### Review Checklist
          - [ ] Confirm LTS ${VERSION} is end-of-life and no longer needs Prow CI
          - [ ] Verify no open PRs on [aks-lts/kubernetes](https://github.com/aks-lts/kubernetes) target \`release-${VERSION}-lts\`
          - [ ] After merge, run [Deploy AKS LTS Prow](../actions/workflows/deploy-lts-prow.yaml) to apply"
          fi

          PR_BODY="${PR_BODY}

          ---
          *Auto-generated by [Manage LTS Prow Job Configs](https://github.com/${{ github.repository }}/actions/workflows/manage-lts-prow-config.yaml) workflow run [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).*"

          # Create PR (or update if branch already has one)
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}..."
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            PR_URL=$(gh pr view "$EXISTING_PR" --json url -q '.url')
            echo "✅ Updated PR: $PR_URL"
          else
            echo "Creating new PR..."
            PR_URL=$(gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH")
            echo "✅ Created PR: $PR_URL"
          fi

          # Write summary to workflow run page
          {
            echo "## ✅ Pull Request Created"
            echo ""
            echo "**PR:** $PR_URL"
            echo "**Action:** \`${ACTION}\` | **Version:** \`${VERSION}\`"
            echo ""
            if [ "$ACTION" = "add" ]; then
              echo "### Job Comparison (vs ${{ steps.job-diff.outputs.prev_version }})"
              echo "${{ steps.job-diff.outputs.job_diff_summary }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
